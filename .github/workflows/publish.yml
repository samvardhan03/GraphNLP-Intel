name: Publish to PyPI

on:
  push:
    tags:
      - 'v*' # Triggers when you push a tag matching v*, e.g. v0.1.0

jobs:
  pypi-publish-main:
    name: Publish Main Platform to PyPI
    runs-on: ubuntu-latest
    
    # Required for Trusted Publishing
    permissions:
      id-token: write
      contents: read
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build

      - name: Build main package
        run: python -m build

      # Uses Trusted Publishing — no token needed in secrets!
      # Note: You MUST configure PyPI to trust this repository first.
      - name: Publish main package
        uses: pypa/gh-action-pypi-publish@release/v1

  pypi-publish-sdk:
    name: Publish SDK to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        working-directory: sdk/python
        run: python -m pip install --upgrade pip build

      - name: Build SDK package
        working-directory: sdk/python
        run: python -m build

      - name: Publish SDK package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/
